<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>财务毛利计算器（含税后）</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f5f7fa;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 500px;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #4a5568;
            font-weight: 600;
        }
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: #4299e1;
            box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.15);
        }
        input.user-input {
            background-color: #fff;
            border-color: #4299e1;
        }
        input.calc-output {
            background-color: #f7fafc;
            color: #2b6cb0;
            font-weight: bold;
        }
        .unit {
            position: absolute;
            right: 16px;
            color: #a0aec0;
            font-size: 14px;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn-reset {
            background-color: #edf2f7;
            color: #4a5568;
        }
        .btn-reset:hover {
            background-color: #e2e8f0;
        }
        .tip {
            margin-top: 15px;
            font-size: 13px;
            color: #718096;
            text-align: center;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>财务毛利计算器</h2>
    
    <div class="form-group">
        <label for="income">进项金额 (Cost)</label>
        <div class="input-wrapper">
            <input type="number" id="income" step="0.01" placeholder="未填/未算出">
            <span class="unit">元</span>
        </div>
    </div>

    <div class="form-group">
        <label for="sales">销项金额 (Revenue)</label>
        <div class="input-wrapper">
            <input type="number" id="sales" step="0.01" placeholder="未填/未算出">
            <span class="unit">元</span>
        </div>
    </div>

    <div class="form-group">
        <label for="profit">毛利 (Profit)</label>
        <div class="input-wrapper">
            <input type="number" id="profit" step="0.01" placeholder="未填/未算出">
            <span class="unit">元</span>
        </div>
    </div>

    <div class="form-group">
        <label for="margin">毛利率 (Margin)</label>
        <div class="input-wrapper">
            <input type="number" id="margin" step="0.1" placeholder="未填/未算出">
            <span class="unit">%</span>
        </div>
    </div>

    <div class="form-group" style="border-top: 1px dashed #e2e8f0; padding-top: 15px;">
        <label for="afterTaxProfit" style="color: #2b6cb0;">税后毛利 (Net Profit / 毛利 × 0.87)</label>
        <div class="input-wrapper">
            <input type="number" id="afterTaxProfit" step="0.01" placeholder="未填/未算出">
            <span class="unit">元</span>
        </div>
    </div>

    <div class="btn-group">
        <button class="btn-reset" onclick="resetForm()">清空数据</button>
    </div>

    <div class="tip">
        输入任意 2 个有效数值，系统将自动推导计算其余所有属性。<br>
        蓝色边框表示您的手输值，无边框表示系统计算值。
    </div>
</div>

<script>
    // 1. 结构体扩展，增加 afterTaxProfit 属性
    class ProfitStructure {
        constructor() {
            this.income = null;          // 进项金额
            this.sales = null;           // 销项金额
            this.margin = null;          // 毛利率
            this.profit = null;          // 毛利
            this.afterTaxProfit = null;   // 税后毛利
        }
    }

    let inputHistory = [];

    // 获取 DOM 元素（包含新产生的税后毛利框）
    const inputs = {
        income: document.getElementById('income'),
        sales: document.getElementById('sales'),
        profit: document.getElementById('profit'),
        margin: document.getElementById('margin'),
        afterTaxProfit: document.getElementById('afterTaxProfit')
    };

    Object.keys(inputs).forEach(key => {
        inputs[key].addEventListener('input', (e) => {
            handleUserIn(key, e.target.value);
        });
    });

    function handleUserIn(key, value) {
        if (value === '') {
            inputHistory = inputHistory.filter(item => item !== key);
            inputs[key].classList.remove('user-input');
        } else {
            if (!inputHistory.includes(key)) {
                inputHistory.push(key);
            }
            inputs[key].classList.add('user-input');
        }
        calculateProfit();
    }

    // 核心推理引擎
    function calculateProfit() {
        let data = new ProfitStructure();
        // 允许追溯最后3个输入，增强复合推导的稳定性
        const activeInputs = inputHistory.slice(-3); 
        
        activeInputs.forEach(key => {
            let val = parseFloat(inputs[key].value);
            if (!isNaN(val)) {
                if (key === 'margin') {
                    data.margin = val / 100; 
                } else {
                    data[key] = val;
                }
            }
        });

        let updated = true;
        let loops = 0;
        // 循环推导直至各变量数据稳定
        while (updated && loops < 5) {
            updated = false;
            
            // 【新业务逻辑】：毛利与税后毛利的双向推导
            if (data.afterTaxProfit === null && data.profit !== null) {
                data.afterTaxProfit = data.profit * 0.87;
                updated = true;
            }
            if (data.profit === null && data.afterTaxProfit !== null) {
                data.profit = data.afterTaxProfit / 0.87;
                updated = true;
            }

            // 【基础公式组1】: 毛利 = 销项 - 进项
            if (data.profit === null && data.sales !== null && data.income !== null) {
                data.profit = data.sales - data.income;
                updated = true;
            }
            if (data.sales === null && data.profit !== null && data.income !== null) {
                data.sales = data.profit + data.income;
                updated = true;
            }
            if (data.income === null && data.sales !== null && data.profit !== null) {
                data.income = data.sales - data.profit;
                updated = true;
            }

            // 【基础公式组2】: 毛利率 = 毛利 / 销项
            if (data.margin === null && data.profit !== null && data.sales !== null && data.sales !== 0) {
                data.margin = data.profit / data.sales;
                updated = true;
            }
            if (data.profit === null && data.margin !== null && data.sales !== null) {
                data.profit = data.sales * data.margin;
                updated = true;
            }
            if (data.sales === null && data.margin !== null && data.profit !== null && data.margin !== 0) {
                data.sales = data.profit / data.margin;
                updated = true;
            }

            // 【复合公式组3】: 进项 + 毛利率 组合
            if (data.sales === null && data.income !== null && data.margin !== null && data.margin !== 1) {
                data.sales = data.income / (1 - data.margin);
                updated = true;
            }
            if (data.profit === null && data.income !== null && data.margin !== null && data.margin !== 1) {
                data.profit = (data.income / (1 - data.margin)) * data.margin;
                updated = true;
            }
        }

        // 3. 渲染视图层
        Object.keys(inputs).forEach(key => {
            if (activeInputs.includes(key)) {
                return; 
            }

            if (data[key] !== null && !isNaN(data[key]) && isFinite(data[key])) {
                let displayVal = data[key];
                if (key === 'margin') {
                    displayVal = (displayVal * 100).toFixed(2); 
                } else {
                    displayVal = displayVal.toFixed(2); 
                }
                inputs[key].value = displayVal;
                inputs[key].classList.add('calc-output');
            } else {
                inputs[key].value = '';
                inputs[key].classList.remove('calc-output');
            }
        });
    }

    function resetForm() {
        inputHistory = [];
        Object.keys(inputs).forEach(key => {
            inputs[key].value = '';
            inputs[key].className = ''; 
        });
    }
</script>

</body>
</html>
